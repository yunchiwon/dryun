<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Chong “Joy” Yun, MD</title>

  <style>
    :root {
      --bg: #f6f7f5;
      --text: #24312b;
      --muted: #5f6d66;
      --accent: #779387;
      --accent-dark: #617b70;
      --shadow: 0 18px 45px rgba(36, 49, 43, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(119, 147, 135, 0.08), transparent 30%),
        linear-gradient(to bottom, #fbfcfb, var(--bg));
      color: var(--text);
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 42px 36px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 2.2rem;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    p {
      margin: 18px 0 0;
      font-size: 1.05rem;
      line-height: 1.6;
      color: #33413a;
    }

    .sub {
      margin-top: 10px;
      color: var(--muted);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.95rem;
    }

    .button {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 22px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .button:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Thank You</h1>

    <p>
      Your information has been received. I look forward to staying connected
      and will share updates as they become available.
    </p>

    <p class="sub">
      You may close this page or return to the homepage.
    </p>

    <a class="button" href="https://dryun.org">
      Return to Home
    </a>
  </div>

</body>
</html>
